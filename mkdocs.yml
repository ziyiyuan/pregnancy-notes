# MkDocs 配置：蔚然成长记录
site_name: 蔚然成长记录
site_description: 从待产到儿童期的科学育儿笔记与家庭护理指南
site_url: https://ziyiyuan.github.io/pregnancy-notes/
repo_url: https://github.com/ziyiyuan/pregnancy-notes

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: pink
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 深色模式
    - scheme: slate
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

